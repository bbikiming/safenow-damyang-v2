<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림 관리 - 담양군 중대재해예방통합관리시스템 v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/v2.css">
</head>
<body data-dy-page="admin-notify" data-page-title="알림 관리" data-page-subtitle="시스템 관리 > 알림 관리 — 문자·메일 설정 및 발송 이력 (SFR-017)">
    <main>
        <div class="dsh-grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">알림 규칙 설정</span>
                    <button class="btn btn-primary btn-sm" onclick="DYV2.toast('알림 규칙 저장 (프로토타입)')">저장</button>
                </div>
                <div class="card-body" style="overflow-x:auto;">
                    <table class="table-figma">
                        <thead><tr><th>이벤트</th><th>시점</th><th>문자</th><th>메일</th><th>수신</th></tr></thead>
                        <tbody>
                            <tr><td style="font-weight:600;">시기도래 (마감 예정)</td><td>D-30 / D-7 / D-1</td><td><input type="checkbox" checked></td><td><input type="checkbox" checked></td><td>담당자</td></tr>
                            <tr><td style="font-weight:600;">기한 초과</td><td>D+1부터 매일</td><td><input type="checkbox" checked></td><td><input type="checkbox" checked></td><td>담당자 + 부서장</td></tr>
                            <tr><td style="font-weight:600;">개선조치(A) 발생</td><td>즉시</td><td><input type="checkbox"></td><td><input type="checkbox" checked></td><td>개선조치 담당</td></tr>
                            <tr><td style="font-weight:600;">종사자 신고 접수</td><td>즉시</td><td><input type="checkbox" checked></td><td><input type="checkbox"></td><td>유해·위험요인 담당</td></tr>
                            <tr><td style="font-weight:600;">주간 요약</td><td>매주 월 09:00</td><td><input type="checkbox"></td><td><input type="checkbox" checked></td><td>부서장 전체</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">발송 이력</span></div>
                <div class="card-body" style="overflow-x:auto;">
                    <table class="table-figma">
                        <thead><tr><th>일시</th><th>채널</th><th>내용</th><th>수신</th><th>결과</th></tr></thead>
                        <tbody>
                            <tr><td>06-11 08:00</td><td><span class="chip-mini wt-elec">문자</span></td><td>기한 초과 — 의무이행 점검표</td><td>3명</td><td><span class="chip-mini st-done">성공</span></td></tr>
                            <tr><td>06-10 17:00</td><td><span class="chip-mini wt">메일</span></td><td>시기도래 주간 요약</td><td>12명</td><td><span class="chip-mini st-done">성공</span></td></tr>
                            <tr><td>06-09 09:00</td><td><span class="chip-mini wt-elec">문자</span></td><td>위험성평가 평가자 지정 통보</td><td>4명</td><td><span class="chip-mini st-done">성공</span></td></tr>
                            <tr><td>06-08 11:20</td><td><span class="chip-mini wt">메일</span></td><td>종사자 신고 접수 알림</td><td>2명</td><td><span class="chip-mini st-todo">1건 실패</span></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="./js/layout.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/common.js"></script>
</body>
</html>
