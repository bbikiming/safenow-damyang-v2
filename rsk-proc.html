<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업공정 관리 — 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/v2.css">
    <style>
        /* ===== PRC01-L 작업공정 관리 (레퍼런스 정합 · 확정 폐지 · 카드 인라인 편집) ===== */
        .rp-toolbar {
            display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
            background: #fff; border: 1px solid var(--card-line); border-radius: var(--radius-card);
            padding: 12px 16px; margin-bottom: 14px;
        }
        .rp-tb-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .rp-tb-label { font-size: 12px; font-weight: 700; color: var(--text-gray); }
        .rp-tb-meta { font-size: 12px; color: var(--text-lightgray); }
        .rp-tb-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        #rp-target { min-width: 250px; width: 250px; }

        /* 공정 카드 */
        .rp-card { background: #fff; border: 1px solid var(--card-line); border-radius: var(--radius-card); margin-bottom: 12px; overflow: hidden; }
        .rp-card.editing { border-color: var(--main-light); box-shadow: var(--shadow-md); }

        /* VIEW 모드 (컴팩트) */
        .rp-view { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 13px 18px; }
        .rp-view-main { min-width: 0; }
        .rp-view-title { font-size: 15px; font-weight: 700; color: var(--text-black); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .rp-seq {
            display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px;
            border-radius: var(--radius-full); background: var(--main); color: #fff; font-size: 12px; font-weight: 700;
        }
        .rp-view-meta { font-size: 12px; color: var(--text-gray); margin-top: 6px; }
        .rp-view-meta .rp-warn { color: var(--status-danger-fg); font-weight: 600; }
        .rp-view-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .rp-chip {
            display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-black);
            background: var(--gray-100); border: 1px solid var(--card-line); border-radius: var(--radius-pill); padding: 2px 10px;
        }
        .rp-chip-cat { font-size: 10px; color: var(--text-lightgray); }
        .rp-chip-eq { border-left: 3px solid var(--text-lightgray); }
        .rp-chip-hf { border-left: 3px solid var(--status-warning-border); }
        .rp-chip.hrf { background: var(--status-info-bg); border-color: var(--status-info-border); color: var(--status-info-fg); }
        .rp-none { font-size: 12px; color: var(--text-lightgray); }
        .rp-view-act { flex-shrink: 0; display: flex; gap: 6px; }

        .rp-tbtn { font-size: 12px; font-weight: 600; color: var(--text-gray); padding: 5px 12px; border: 1px solid var(--card-line); border-radius: var(--radius-button); background: #fff; cursor: pointer; }
        .rp-tbtn:hover { border-color: var(--main-light); color: var(--main-dark); }
        .rp-tbtn.danger { color: var(--status-danger-fg); border-color: var(--status-danger-border); }
        .rp-tbtn.danger:hover { background: var(--status-danger-bg); }

        /* EDIT 모드 */
        .rp-edit-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 18px; background: var(--brand-50); border-bottom: 1px solid var(--card-line); }
        .rp-edit-head b { font-size: 14px; color: var(--main-dark2); }
        .rp-edit-body { padding: 14px 18px; }
        .rp-frow { margin-bottom: 12px; }
        .rp-frow .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-gray); margin-bottom: 5px; }
        .rp-req { color: var(--status-danger-fg); }
        .rp-grid3 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .rp-hint { font-size: 12px; color: var(--text-gray); margin-top: 4px; }

        .rp-sec { padding: 12px 0; border-top: 1px dashed var(--card-line); }
        .rp-sec-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
        .rp-sec-title { font-size: 13px; font-weight: 700; color: var(--text-black); }
        .rp-cnt { display: inline-flex; min-width: 20px; height: 20px; padding: 0 6px; align-items: center; justify-content: center; border-radius: var(--radius-full); background: var(--status-info-bg); color: var(--main); font-size: 12px; font-weight: 700; margin-left: 4px; }
        .rp-sel { font-size: 12px; font-weight: 600; color: var(--main-dark); padding: 3px 12px; border: 1px solid var(--main-light); border-radius: var(--radius-pill); background: #fff; cursor: pointer; }
        .rp-sel:hover { background: var(--brand-100); }
        .rp-echip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-black); background: var(--gray-100); border: 1px solid var(--card-line); border-radius: var(--radius-pill); padding: 3px 6px 3px 10px; }
        .rp-echip button { border: none; background: none; cursor: pointer; color: var(--text-lightgray); font-size: 13px; line-height: 1; padding: 0 2px; }
        .rp-echip button:hover { color: var(--status-danger-fg); }

        /* 유해위험요인 리스트 (가감 체크) */
        .rp-hrf-list { display: flex; flex-direction: column; gap: 6px; }
        .rp-hrf { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 10px; border: 1px solid var(--card-line); border-radius: var(--radius-button); background: #fff; }
        .rp-hrf.off { opacity: .5; }
        .rp-hrf-name { font-size: 13px; font-weight: 600; color: var(--text-black); }
        .rp-hrf-legal { font-size: 12px; color: var(--text-gray); }
        .rp-pending { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: var(--radius-md); background: var(--status-warning-bg); color: var(--status-warning-fg); border: 1px solid var(--status-warning-border); }
        .rp-hrf-tail { margin-left: auto; }
        .src-badge { display: inline-block; padding: 1px 8px; border-radius: var(--radius-md); font-size: 11px; font-weight: 600; }
        .src-badge.kosha  { background: var(--status-info-bg); color: var(--status-info-fg); border: 1px solid var(--status-info-border); }
        .src-badge.manual { background: var(--gray-100); color: var(--text-gray); border: 1px solid var(--card-line); }
        .src-badge.ins    { background: var(--status-purple-bg); color: var(--status-purple-fg); border: 1px solid var(--status-purple-border); }

        .rp-edit-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--card-line); background: #fafafa; }

        /* 인라인 선택 패널 본문 */
        .rp-pick-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; border: 1px solid var(--card-line); border-radius: var(--radius-button); padding: 6px; margin: 8px 0; }
        .rp-pick-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 13px; border-radius: var(--radius-button); cursor: pointer; color: var(--text-black); }
        .rp-pick-item:hover { background: #fafafa; }
        .rp-pick-item.on { background: var(--brand-100); }
        .rp-pick-cat { font-size: 11px; color: var(--text-lightgray); margin-left: auto; }
    </style>
</head>
<body data-dy-page="rsk-proc"
      data-page-title="작업공정 관리"
      data-page-subtitle="관리대상 ▸ 공정 카드(설비·유해인자·유해위험요인) · 위험성평가 원본 (PRC01-L)">
    <main>
        <div class="check-notice">
            관리대상의 <b>작업 공정</b>을 관리합니다. 카드당 <b>[수정]</b> 하나로 공정명·담당·설비·유해인자·유해위험요인을
            카드 안에서 편집하고, <b>공정·설비·유해인자 각각</b>이 표준 유해위험요인을 끌어와 <b>합집합</b>으로 자동 구성됩니다.
            확정 개념은 없으며 저장 즉시 활성입니다. 설비·작업방법을 바꾸고 <b>[반영]</b>하면 <b>수시 위험성평가 생성</b>을 확인합니다.
        </div>
        <div id="rp-root"></div>
    </main>

    <script src="./js/layout.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/rsk-kosha.js"></script>
    <script src="./js/rsk-data.js"></script>
    <script src="./js/rsk-proc.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () { window.RSKPROC.init('rp-root'); });
    </script>
</body>
</html>
