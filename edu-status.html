<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이수현황 — 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/v2.css">
</head>
<body data-dy-page="edu-status"
      data-page-title="이수현황"
      data-page-subtitle="부서/대상자별 필요·인정·미달·완료 여부 + 독촉 (EDU-STATUS)">
    <main>
        <div class="check-notice">
            부서별 완료율과 대상자별 <b>사이클(기간·D-day) · 필요 · 인정 · 미달 · 완료</b> 상태를 확인합니다.
            미이수자를 개별 또는 일괄 선택해 부서 담당자에게 <b>독촉 알림</b>을 발송할 수 있습니다.
        </div>
        <div id="es-root"></div>
    </main>

    <div id="toast" class="toast" role="status"></div>

    <script src="./js/layout.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/org-pick.js"></script>
    <script src="./js/edu-data.js"></script>
    <script src="./js/edu-filter.js"></script>
    <script src="./js/edu-status.js"></script>
    <script src="./js/edu-tour.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            window.EDUS.init('es-root');
            window.EDUTOUR.boot();
        });
    </script>
</body>
</html>
