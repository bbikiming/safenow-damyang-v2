<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 할일 — 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/v2.css">
    <style>
        /* 헤더 */
        .mw-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--card-line); border-radius: var(--radius-card); padding: 12px 16px; margin-bottom: 12px; }
        .mw-head-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .mw-head-right { display: flex; align-items: center; gap: 8px; }
        .mw-title { font-size: var(--fs-18); font-weight: 700; color: var(--text-black); margin: 0; }
        .mw-synced { font-size: var(--fs-12); color: var(--text-gray); }
        .mw-synced b { color: var(--text-black); font-weight: 700; }
        .mw-deptlabel { font-size: var(--fs-12); font-weight: 700; color: var(--text-gray); }

        /* KPI 칩 */
        .mw-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 12px; }
        .mw-kpi { background: var(--surface); border: 1px solid var(--card-line); border-left: 4px solid var(--gray-200); border-radius: var(--radius-card); padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
        .mw-kpi-num { font-size: var(--fs-22); font-weight: 800; color: var(--text-black); line-height: 1; }
        .mw-kpi-label { font-size: var(--fs-12); color: var(--text-gray); font-weight: 700; }
        .mw-kpi-danger  { border-left-color: var(--status-danger-fg); }
        .mw-kpi-danger  .mw-kpi-num { color: var(--status-danger-fg); }
        .mw-kpi-warning { border-left-color: var(--status-warning-fg); }
        .mw-kpi-warning .mw-kpi-num { color: var(--status-warning-fg); }
        .mw-kpi-info    { border-left-color: var(--status-info-fg); }
        .mw-kpi-info    .mw-kpi-num { color: var(--status-info-fg); }
        .mw-kpi-purple  { border-left-color: var(--status-purple-fg); }
        .mw-kpi-purple  .mw-kpi-num { color: var(--status-purple-fg); }
        .mw-kpi-neutral { border-left-color: var(--text-gray); }

        /* 필터 바 */
        .mw-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--card-line); border-radius: var(--radius-card); padding: 10px 14px; margin-bottom: 14px; }
        .mw-filters .form-select { min-width: 140px; width: auto; flex: 0 0 auto; }
        .mw-filter-count { margin-left: auto; font-size: var(--fs-12); color: var(--text-gray); font-weight: 700; }

        /* 그룹 */
        .mw-group { background: var(--surface); border: 1px solid var(--card-line); border-radius: var(--radius-card); margin-bottom: 12px; overflow: hidden; }
        .mw-group-head { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--card-line); background: var(--gray-50); font-weight: 700; font-size: var(--fs-13); }
        .mw-g-danger  .mw-group-head { background: var(--status-danger-bg); color: var(--status-danger-fg); }
        .mw-g-warning .mw-group-head { background: var(--status-warning-bg); color: var(--status-warning-fg); }
        .mw-g-success .mw-group-head { background: var(--status-success-bg); color: var(--status-success-fg); }
        .mw-g-neutral .mw-group-head { background: var(--gray-50); color: var(--text-gray); }
        .mw-group-icon { font-size: var(--fs-14); }
        .mw-group-label { font-weight: 700; }
        .mw-group-count { margin-left: auto; font-size: var(--fs-12); padding: 2px 9px; border-radius: var(--radius-full); background: var(--surface); color: var(--text-gray); font-weight: 700; }
        .mw-group-body { padding: 6px 0; }

        /* 항목 */
        .mw-item { padding: 10px 16px; border-bottom: 1px solid var(--card-line); }
        .mw-item:last-child { border-bottom: none; }
        .mw-item.remind { background: var(--status-warning-bg); border-left: 3px solid var(--status-warning-fg); }
        .mw-item-head { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
        .mw-item-main { flex: 1; min-width: 0; }
        .mw-item-title { font-size: var(--fs-13); font-weight: 700; color: var(--text-black); margin-left: 4px; }
        .mw-item-sub { font-size: var(--fs-12); color: var(--text-gray); margin-top: 4px; }
        .mw-item-meta { display: flex; gap: 8px; margin-top: 5px; font-size: var(--fs-12); align-items: center; flex-wrap: wrap; }
        .mw-item-due { color: var(--text-lightgray); }
        .mw-item-dept { color: var(--text-gray); padding: 1px 8px; border-radius: var(--radius-xs); background: var(--gray-100); font-size: var(--fs-12); }
        .mw-item-actions { flex-shrink: 0; display: flex; gap: 6px; align-items: center; }
        .mw-cat { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--fs-12); font-weight: 700; }
        .mw-remind-tag { display: inline-block; padding: 2px 8px; border-radius: var(--radius-full); background: var(--status-warning-bg); color: var(--status-warning-fg); font-size: var(--fs-12); font-weight: 700; border: 1px solid var(--status-warning-border); }
        .mw-dday { font-weight: 700; padding: 1px 8px; border-radius: var(--radius-xs); background: var(--gray-100); color: var(--text-gray); font-size: var(--fs-12); }
        .mw-dday.over  { background: var(--status-danger-bg);  color: var(--status-danger-fg); }
        .mw-dday.soon  { background: var(--status-warning-bg); color: var(--status-warning-fg); }
        .mw-dday.done  { background: var(--status-success-bg); color: var(--status-success-fg); }

        /* KPI 칩 = 클릭 필터 (버튼화) */
        .mw-kpi { cursor: pointer; text-align: left; font-family: inherit; transition: box-shadow .12s ease, transform .12s ease; }
        .mw-kpi:hover { box-shadow: var(--shadow-md); }
        .mw-kpi.active { box-shadow: var(--focus-ring); border-color: var(--main); }
        .mw-kpi:focus-visible { outline: 2px solid var(--main); outline-offset: 2px; }

        /* 뷰 탭 (마감 할일 | 발행된 업무) — 표준 .tabs 위 여백만 보정 */
        .mw-tabs { margin-bottom: 12px; }
        .mw-tab-n { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; padding: 0 6px; margin-left: 4px; border-radius: var(--radius-full); background: var(--gray-200); color: var(--text-gray); font-size: var(--fs-12); font-weight: 700; }
        .tab.active .mw-tab-n { background: var(--brand-100); color: var(--main-dark); }

        /* 그룹 헤더 색점 (이모지 대체) */
        .mw-group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .mw-g-done .mw-group-head { opacity: .75; }
        .mw-item.is-done .mw-item-title { color: var(--text-gray); }

        /* 처리 위치(목적지) 칩 — 메뉴 이동형 */
        .mw-dest { display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px; border-radius: var(--radius-full); background: var(--brand-50); color: var(--main-dark); font-size: var(--fs-12); font-weight: 700; border: 1px solid var(--brand-100); }

        /* 첨부 완료 마크 */
        .mw-done-mark { display: inline-flex; align-items: center; gap: 4px; font-size: var(--fs-12); font-weight: 700; color: var(--status-success-fg); padding: 4px 10px; background: var(--status-success-bg); border: 1px solid var(--status-success-border); border-radius: var(--radius-full); }

        /* 카드 자체 클릭 = 대표 액션 (메뉴 이동 · 첨부 팝업) */
        .mw-item.mw-click { cursor: pointer; transition: background .12s ease; }
        .mw-item.mw-click:hover { background: var(--brand-50); }
        .mw-item.mw-click.remind:hover { background: var(--status-warning-bg); }

        /* 첨부 팝업(모달) 본문 + 파일 필 */
        .mw-attach .upload-drop { padding: 18px 12px; font-size: var(--fs-13); }
        .mw-attach-target { font-size: var(--fs-13); font-weight: 700; color: var(--text-black); margin: 0 0 10px; }
        .mw-attach-note { font-size: var(--fs-12); color: var(--text-gray); background: var(--surface-alt); border: 1px solid var(--card-line); border-radius: var(--radius-button); padding: 8px 10px; margin: 0 0 10px; line-height: 1.5; }
        .mw-file-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .mw-file-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 6px 4px 10px; border-radius: var(--radius-full); background: var(--surface); border: 1px solid var(--card-line); font-size: var(--fs-12); font-weight: 600; color: var(--text-black); }
        .mw-file-x { border: none; background: var(--gray-200); color: var(--text-gray); width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: var(--fs-12); line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
        .mw-file-x:hover { background: var(--status-danger-bg); color: var(--status-danger-fg); }

        /* 발행된 업무 — 처리유형 칩 필터 + 안내 */
        .mw-pub-chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .mw-pub-chip { border: 1px solid var(--card-line); background: var(--surface); color: var(--text-gray); padding: 6px 12px; border-radius: var(--radius-full); font-size: var(--fs-12); font-weight: 700; cursor: pointer; font-family: inherit; transition: all .12s ease; }
        .mw-pub-chip b { font-weight: 800; margin-left: 2px; }
        .mw-pub-chip:hover { border-color: var(--main); color: var(--main-dark); }
        .mw-pub-chip.active { background: var(--brand-100); border-color: var(--main); color: var(--main-dark); }
        .mw-pub-note { font-size: var(--fs-12); color: var(--text-gray); background: var(--surface-alt); border: 1px solid var(--card-line); border-radius: var(--radius-button); padding: 9px 12px; margin-bottom: 10px; line-height: 1.5; }

        /* 버튼 안 SVG 정렬 */
        .mw-item-actions .btn svg, .mw-head .btn svg { vertical-align: -2px; }

        /* 재촉 응답 인라인 폼 */
        .mw-inline { margin-top: 10px; padding: 10px 12px; background: var(--brand-50); border: 1px solid var(--main); border-radius: var(--radius-button); }
        .mw-inline-row { margin-bottom: 8px; }
        .mw-inline-row label { font-size: var(--fs-12); font-weight: 700; color: var(--text-gray); display: block; margin-bottom: 4px; }
        .mw-inline-row textarea, .mw-inline-row input[type=date] { width: 100%; padding: 7px 9px; font-size: var(--fs-13); border: 1px solid var(--card-line); border-radius: var(--radius-md); box-sizing: border-box; font-family: inherit; }
        .mw-inline-row input[type=date] { max-width: 220px; }
        .mw-inline-foot { display: flex; gap: 6px; justify-content: flex-end; }

        .mw-empty { background: var(--surface); border: 1px solid var(--card-line); border-radius: var(--radius-card); padding: 40px 20px; text-align: center; color: var(--text-lightgray); font-size: var(--fs-13); }

        @media (max-width: 767px) {
            .mw-kpis { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body data-dy-page="my-work"
      data-page-title="내 할일"
      data-page-subtitle="전 업무 통합 할일 — 결재·위험·개선·점검·의견·이행·도급·평가 (MYW01-V)">
    <main>
        <div class="check-notice">
            부서 담당자 관점에서 처리할 <b>전 업무</b>를 통합해서 보여줍니다.
            상단 알림에서 넘어오면 여기서 <b>카드를 눌러 바로 처리</b>할 수 있습니다 —
            첨부형은 <b>팝업에서 파일 첨부</b>, 메뉴 진행형은 처리 화면으로 이동합니다.
            완료한 업무는 <b>완료한 업무</b> 탭에 모이고, 첨부형은 <b>첨부 재등록</b>으로 나중에 파일을 교체할 수 있습니다.
        </div>
        <div id="mw-root"></div>
    </main>

    <script src="./js/layout.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/rsk-kosha.js"></script>
    <script src="./js/rsk-data.js"></script>
    <script src="./js/edu-data.js"></script>
    <script src="./js/sets-data-v2.js"></script><!-- 발행된 업무 탭 (DY_DOCS_V2·DY_MENUS_V2) -->
    <script src="./js/my-work.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () { window.MYWORK.init('mw-root'); });
    </script>
</body>
</html>
